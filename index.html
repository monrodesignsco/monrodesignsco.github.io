<!DOCTYPE html>
<html lang="en">

<head>
    <title>Monro Designs Co</title>
    <link rel="icon" type="image/x-icon" href="/src/Logo_200x200.jpg">

    <style>
        /* Absolute layout boundaries to prevent rendering calculation bugs */
        html, body {
          margin: 0;
          padding: 0;
          height: 100%;
          width: 100%;
          overflow: hidden; /* Stops ugly double scrollbars from forming */
        }
        
        body {
          line-height: 27.2px;
          font-family: "Graphik Webfont", "-apple-system", "Helvetica Neue", "Droid Sans", "Arial", "sans-serif";
        }
        
        /* Outer wrapper containing both elements */
        .app-viewport {
          display: flex;
          flex-direction: column;
          height: 100vh;
          width: 100vw;
        }
        
        /* Fixed aspect-ratio element matching your 3360x840 banner asset */
        .shop-banner {
          width: 100%;
          height: auto;
          aspect-ratio: 3360 / 840; /* Forces precise 4:1 width-to-height scaling */
          display: block; 
          object-fit: cover;
          flex-shrink: 0; /* Prevents the iframe from squishing the banner height */
        }
        
        /* Structural container for your third-party Etsy widget */
        .etsy-widget-frame {
          width: 100%;
          flex-grow: 1; /* Instructs browser to expand into remaining area natively */
          min-height: 0; /* Important: prevents iframes from pushing content past screen boundaries */
          border: none;
          display: block;
        }
    </style>
