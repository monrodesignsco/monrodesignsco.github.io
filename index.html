<!DOCTYPE html>
<html lang="en">
<head>
  <title>Monro Designs Co</title>
  <link rel="icon" type="image/x-icon" href="/src/Logo_200x200.jpg">

  <style>
    /* Reset margins and lock parent heights */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden; 
    }

    body {
      line-height:27.2px;
      font-family:"Graphik Webfont","-apple-system","Helvetica Neue","Droid Sans","Arial","sans-serif";
    }

    /* Full screen container */
    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
    }

    /* Animated aspect ratio setup for your 3360x840 banner */
    .shop-banner {
      width: 100%;
      height: auto;
      aspect-ratio: 3360 / 840;
      display: block; 
      object-fit: cover;
      transition: max-height 0.4s ease-in-out, opacity 0.4s ease-in-out; /* Explicit animations */
      opacity: 1;
      max-height: 25vh; 
    }

    /* Class applied by JavaScript when scrolling happens */
    .shop-banner.shrunk {
      max-height: 0px !important;
      opacity: 0;
      pointer-events: none; 
    }

    /* Force the Etsy iframe to take exactly what vertical space is left */
    .etsy-iframe {
      width: 100%;
      flex: 1;
      min-height: 0; 
      border: none;
    }
  </style>

  <!-- Google Site Verification -->
  <meta name="google-site-verification" content="oa5vPCkiySA9xVVFAL_LoFbC-GhN_sXa20v6H7858_w" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://googletagmanager.com"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-872XP6ZWSB');
  </script>
  
  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s),j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src='https://googletagmanager.com;})(window,document,'script','dataLayer','GTM-WRJ43XTK');</script>
  <!-- End Google Tag Manager -->
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://googletagmanager.com"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <!-- Layout wrapper -->
  <div class="app-container" id="mainContainer">
    <img src="/src/Shop_Banner_3360x840.jpg" alt="Monro Designs Co Banner" class="shop-banner" id="bannerImg">
    <iframe id="etsyWidget" src="https://sociablekit.com" class="etsy-iframe"></iframe>
  </div>

  <script>
    const banner = document.getElementById('bannerImg');
    const iframe = document.getElementById('etsyWidget');
    
    // Function to force Etsy widget layout recalculation 
    function fixWidgetLayout() {
      // Temporarily toggle width slightly to force the internal browser engine 
      // inside the iframe to recalculate responsive CSS grids natively.
      iframe.style.width = '99.9%';
      setTimeout(() => {
        iframe.style.width = '100%';
      }, 50);
    }

    // Fix tiles immediately after the banner's CSS transition completes
    banner.addEventListener('transitionend', fixWidgetLayout);

    // Detects trackpad/mousewheel scrolling downward anywhere on the layout
    window.addEventListener('wheel', function(event) {
      if (event.deltaY > 0) {
        if (!banner.classList.contains('shrunk')) {
          banner.classList.add('shrunk');
        }
      } else if (event.deltaY < -10) {
        if (banner.classList.contains('shrunk')) {
          banner.classList.remove('shrunk');
        }
      }
    });

    // Detects swipe up actions on mobile touch screens
    let touchStart = 0;
    window.addEventListener('touchstart', e => touchStart = e.changedTouches.screenY);
    window.addEventListener('touchend', e => {
      let touchEnd = e.changedTouches.screenY;
      if (touchStart - touchEnd > 30) { 
        if (!banner.classList.contains('shrunk')) {
          banner.classList.add('shrunk');
        }
      } else if (touchEnd - touchStart > 50) {
        if (banner.classList.contains('shrunk')) {
          banner.classList.remove('shrunk');
        }
      }
    });
  </script>

</body>
</html>
